name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/techbadji/pyexam-backend
  FRONTEND_IMAGE: ghcr.io/techbadji/pyexam-frontend

jobs:
  # ── Build backend image ────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:cache,mode=max

  # ── Build frontend image ───────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_BASE_PATH=/pyexam/
            VITE_API_URL=/pyexam
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:cache,mode=max

  # ── Deploy on AWS via SSH ──────────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: www.digitalmatis.com
          username: bitnami
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/pyexam
            git pull origin main
            sudo docker compose -f docker-compose.yml -f docker-compose.aws.yml pull backend frontend celery_worker celery_beat
            sudo docker compose -f docker-compose.yml -f docker-compose.aws.yml up -d --no-build
            sudo docker image prune -f
