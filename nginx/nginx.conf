worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    server_tokens   off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Docker's internal DNS — re-resolve every 5 s so nginx survives container restarts
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;
        server_name _;

        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # API — strip /api prefix then forward to backend
        location /api/ {
            set $backend backend:8000;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://$backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout    120s;
            proxy_connect_timeout  10s;

            add_header X-Frame-Options         "SAMEORIGIN"                          always;
            add_header X-Content-Type-Options  "nosniff"                             always;
            add_header X-XSS-Protection        "1; mode=block"                       always;
            add_header Referrer-Policy         "strict-origin-when-cross-origin"     always;
        }

        # Frontend SPA — security headers + no-cache for HTML
        location / {
            set $frontend frontend:80;
            proxy_pass http://$frontend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header X-Frame-Options         "SAMEORIGIN"                                                                    always;
            add_header X-Content-Type-Options  "nosniff"                                                                       always;
            add_header X-XSS-Protection        "1; mode=block"                                                                 always;
            add_header Referrer-Policy         "strict-origin-when-cross-origin"                                               always;
            add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()"                                     always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net;" always;
            add_header Cache-Control           "no-cache, must-revalidate"                                                     always;
        }
    }
}
