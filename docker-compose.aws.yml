# Overlay pour le déploiement AWS — www.digitalmatis.com/pyexam/
# Usage: docker compose -f docker-compose.yml -f docker-compose.aws.yml up -d --build
# Note: set NGINX_PORT=8888 in .env to avoid conflict with host Apache on port 80

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: /pyexam/
        VITE_API_URL: /pyexam
