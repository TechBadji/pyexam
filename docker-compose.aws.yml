# Overlay pour le déploiement AWS — www.digitalmatis.com/pyexam/
# Usage: docker compose -f docker-compose.yml -f docker-compose.aws.yml up -d --no-build
# Images pré-buildées par GitHub Actions et poussées sur GHCR

services:
  backend:
    image: ghcr.io/techbadji/pyexam-backend:latest

  celery_worker:
    image: ghcr.io/techbadji/pyexam-backend:latest

  celery_beat:
    image: ghcr.io/techbadji/pyexam-backend:latest

  frontend:
    image: ghcr.io/techbadji/pyexam-frontend:latest
